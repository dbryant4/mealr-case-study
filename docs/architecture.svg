<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 980" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6b7a"/>
    </marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6b7a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1040" height="980" rx="10" fill="#ffffff"/>
  <text x="520" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#15212e">Mealr — system architecture</text>

  <!-- ================= Section 1: Request path ================= -->
  <rect x="16" y="50" width="1008" height="176" rx="14" fill="#f3f7fb" stroke="#dbe4ee"/>
  <text x="34" y="76" font-size="13" font-weight="700" fill="#2E5C8A">1 · Request path</text>

  <!-- User -->
  <rect x="40" y="96" width="120" height="54" rx="8" fill="#fff" stroke="#2E5C8A" stroke-width="1.5"/>
  <text x="100" y="128" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2a38">User</text>

  <!-- Web app -->
  <rect x="208" y="96" width="188" height="54" rx="8" fill="#fff" stroke="#2E5C8A" stroke-width="1.5"/>
  <text x="302" y="119" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2a38">Web app</text>
  <text x="302" y="136" text-anchor="middle" font-size="11" fill="#5b6b7a">React + Vite · CloudFront</text>

  <!-- API Gateway -->
  <rect x="452" y="96" width="168" height="54" rx="8" fill="#fff" stroke="#2E5C8A" stroke-width="1.5"/>
  <text x="536" y="119" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2a38">API Gateway</text>
  <text x="536" y="136" text-anchor="middle" font-size="11" fill="#5b6b7a">base-path routing</text>

  <!-- HTTP APIs -->
  <rect x="680" y="90" width="320" height="66" rx="8" fill="#fff" stroke="#2E5C8A" stroke-width="1.5"/>
  <text x="840" y="116" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2a38">HTTP APIs · per-service JWT auth</text>
  <text x="840" y="134" text-anchor="middle" font-size="11" fill="#5b6b7a">account · recipes · shopping · ask</text>

  <!-- Cognito -->
  <rect x="208" y="170" width="188" height="38" rx="8" fill="#eef4fa" stroke="#9bb6d2" stroke-width="1.2"/>
  <text x="302" y="194" text-anchor="middle" font-size="12" font-weight="600" fill="#2E5C8A">Cognito · OIDC · MFA · passkeys</text>

  <!-- arrows S1 -->
  <line x1="160" y1="123" x2="206" y2="123" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="396" y1="123" x2="450" y2="123" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="620" y1="123" x2="678" y2="123" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="302" y1="150" x2="302" y2="168" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ================= Section 2: Ingestion pipeline ================= -->
  <rect x="16" y="246" width="1008" height="150" rx="14" fill="#fbf4ec" stroke="#ecdcc7"/>
  <text x="34" y="272" font-size="13" font-weight="700" fill="#B5651D">2 · Ingestion pipeline — document AI (PDF · photo · URL)</text>

  <!-- Sources -->
  <rect x="40" y="300" width="150" height="22" rx="6" fill="#fff" stroke="#B5651D"/>
  <text x="115" y="315" text-anchor="middle" font-size="10.5" fill="#1a2a38">PDF upload</text>
  <rect x="40" y="326" width="150" height="22" rx="6" fill="#fff" stroke="#B5651D"/>
  <text x="115" y="341" text-anchor="middle" font-size="10.5" fill="#1a2a38">Photo · up to 5 pages</text>
  <rect x="40" y="352" width="150" height="22" rx="6" fill="#fff" stroke="#B5651D"/>
  <text x="115" y="367" text-anchor="middle" font-size="10.5" fill="#1a2a38">URL</text>
  <line x1="190" y1="311" x2="190" y2="363" stroke="#5b6b7a" stroke-width="1.4"/>
  <line x1="190" y1="337" x2="212" y2="337" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="201" y="330" text-anchor="middle" font-size="9" fill="#8a7150">import</text>

  <!-- Dispatcher -->
  <rect x="214" y="309" width="150" height="56" rx="8" fill="#fff" stroke="#B5651D" stroke-width="1.7"/>
  <text x="289" y="332" text-anchor="middle" font-size="14" font-weight="600" fill="#B5651D">Dispatcher</text>
  <text x="289" y="349" text-anchor="middle" font-size="10" fill="#5b6b7a">per-user cap · QUEUED</text>

  <!-- Step Functions pipeline -->
  <rect x="400" y="302" width="310" height="74" rx="9" fill="#fff" stroke="#B5651D" stroke-width="1.5"/>
  <text x="555" y="322" text-anchor="middle" font-size="12.5" font-weight="600" fill="#B5651D">Step Functions · RecipePipeline</text>
  <text x="555" y="342" text-anchor="middle" font-size="10.5" fill="#5b6b7a">extract (Bedrock Claude) → validate → render</text>
  <text x="555" y="358" text-anchor="middle" font-size="10.5" fill="#5b6b7a">→ banner → save &amp; tag → update index</text>

  <!-- S3 + KB -->
  <rect x="744" y="309" width="118" height="56" rx="8" fill="#fff" stroke="#B5651D" stroke-width="1.5"/>
  <text x="803" y="332" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2a38">S3</text>
  <text x="803" y="349" text-anchor="middle" font-size="10.5" fill="#5b6b7a">structured JSON</text>

  <rect x="880" y="309" width="120" height="56" rx="8" fill="#fff" stroke="#B5651D" stroke-width="1.5"/>
  <text x="940" y="332" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a2a38">Knowledge Base</text>
  <text x="940" y="349" text-anchor="middle" font-size="9.5" fill="#5b6b7a">Bedrock + S3 Vectors</text>

  <line x1="364" y1="337" x2="398" y2="337" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="381" y="330" text-anchor="middle" font-size="9" fill="#8a7150">start / queue</text>
  <line x1="710" y1="337" x2="742" y2="337" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="726" y="330" text-anchor="middle" font-size="9" fill="#8a7150">write</text>
  <line x1="862" y1="337" x2="878" y2="337" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="870" y="330" text-anchor="middle" font-size="9" fill="#8a7150">sync</text>

  <text x="34" y="390" font-size="10.5" fill="#8a7150">Dispatcher gates per-user concurrency with QUEUED rows (no SQS); on success the pipeline emits an "Import Job Succeeded" event that triggers KB sync.</text>

  <!-- ================= Section 3: Ask / RAG ================= -->
  <rect x="16" y="416" width="1008" height="172" rx="14" fill="#eef7f3" stroke="#cae3da"/>
  <text x="34" y="442" font-size="13" font-weight="700" fill="#1F7A6B">3 · Ask — agentic, streaming RAG</text>

  <rect x="40" y="478" width="150" height="56" rx="8" fill="#fff" stroke="#1F7A6B" stroke-width="1.5"/>
  <text x="115" y="501" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2a38">ask-api</text>
  <text x="115" y="518" text-anchor="middle" font-size="11" fill="#5b6b7a">/ask</text>

  <rect x="300" y="478" width="220" height="56" rx="8" fill="#fff" stroke="#1F7A6B" stroke-width="1.5"/>
  <text x="410" y="501" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2a38">Knowledge Base</text>
  <text x="410" y="518" text-anchor="middle" font-size="11" fill="#5b6b7a">retrieval scoped by userId</text>

  <rect x="620" y="478" width="180" height="56" rx="8" fill="#fff" stroke="#1F7A6B" stroke-width="1.5"/>
  <text x="710" y="501" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2a38">Ask agent (Strands)</text>
  <text x="710" y="518" text-anchor="middle" font-size="11" fill="#5b6b7a">Bedrock · Claude Sonnet 4.6</text>

  <rect x="840" y="478" width="168" height="56" rx="8" fill="#fff" stroke="#1F7A6B" stroke-width="1.5"/>
  <text x="924" y="501" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2a38">Response</text>
  <text x="924" y="518" text-anchor="middle" font-size="11" fill="#5b6b7a">streamed (SSE) + citations</text>

  <line x1="190" y1="506" x2="298" y2="506" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="244" y="498" text-anchor="middle" font-size="10" fill="#4f8c7e">query + history</text>
  <line x1="520" y1="506" x2="618" y2="506" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="569" y="498" text-anchor="middle" font-size="10" fill="#4f8c7e">context</text>
  <line x1="800" y1="506" x2="838" y2="506" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="819" y="498" text-anchor="middle" font-size="10" fill="#4f8c7e">answer</text>

  <text x="34" y="566" font-size="11" fill="#5b6b7a">Retrieval is filtered to the caller&#8217;s identity — users only ever see their own recipes; citations are validated against retrieval to prevent hallucinated sources.</text>

  <!-- ================= Section 4: MCP access ================= -->
  <rect x="16" y="608" width="1008" height="160" rx="14" fill="#f4eefb" stroke="#e0d3f0"/>
  <text x="34" y="634" font-size="13" font-weight="700" fill="#6b4ea8">4 · MCP access — let any agent use your recipes</text>

  <rect x="40" y="668" width="190" height="56" rx="8" fill="#fff" stroke="#6b4ea8" stroke-width="1.5"/>
  <text x="135" y="691" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2a38">AI agent / MCP client</text>
  <text x="135" y="708" text-anchor="middle" font-size="11" fill="#5b6b7a">Claude, IDEs, etc.</text>

  <rect x="340" y="668" width="240" height="56" rx="8" fill="#fff" stroke="#6b4ea8" stroke-width="1.7"/>
  <text x="460" y="691" text-anchor="middle" font-size="14" font-weight="600" fill="#6b4ea8">MCP server</text>
  <text x="460" y="708" text-anchor="middle" font-size="11" fill="#5b6b7a">mcp.mealr.recipes (Lambda)</text>

  <rect x="690" y="668" width="170" height="56" rx="8" fill="#fff" stroke="#6b4ea8" stroke-width="1.5"/>
  <text x="775" y="691" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2a38">Mealr APIs</text>
  <text x="775" y="708" text-anchor="middle" font-size="11" fill="#5b6b7a">recipes · kb · shopping</text>

  <line x1="230" y1="696" x2="338" y2="696" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="284" y="688" text-anchor="middle" font-size="10" fill="#7a6b8a">OAuth 2.1 + Bearer</text>
  <line x1="580" y1="696" x2="688" y2="696" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="634" y="688" text-anchor="middle" font-size="10" fill="#7a6b8a">caller&#8217;s token</text>

  <text x="34" y="746" font-size="11" fill="#5b6b7a">14 tools (v2.0): 9 recipe tools incl. semantic_search_recipes (vector search) + 5 shopping-list tools incl. create/update actions.</text>
  <text x="34" y="761" font-size="11" fill="#5b6b7a">Per-user OAuth 2.1 token forwarding; writes scoped to shopping lists.</text>

  <!-- ================= Section 5: Insights (async agentic job) ================= -->
  <rect x="16" y="784" width="1008" height="180" rx="14" fill="#eef0fb" stroke="#d3d7f0"/>
  <text x="34" y="810" font-size="13" font-weight="700" fill="#4a4eae">5 · Insights — an async, agentic job (Bedrock AgentCore Harness)</text>
  <text x="34" y="830" font-size="11" fill="#5b6b7a">Managed model + tools-as-config · the Harness has zero data access · per-user scope is enforced by the Job Lambda&#8217;s IAM role.</text>

  <!-- trigger -->
  <rect x="40" y="856" width="138" height="56" rx="8" fill="#fff" stroke="#4a4eae" stroke-width="1.5"/>
  <text x="109" y="880" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2a38">EventBridge · SQS</text>
  <text x="109" y="896" text-anchor="middle" font-size="10" fill="#5b6b7a">FIFO · debounced</text>

  <!-- harness agent -->
  <rect x="214" y="856" width="180" height="56" rx="8" fill="#fff" stroke="#4a4eae" stroke-width="1.8"/>
  <text x="304" y="880" text-anchor="middle" font-size="14" font-weight="600" fill="#4a4eae">Harness agent</text>
  <text x="304" y="896" text-anchor="middle" font-size="10" fill="#5b6b7a">AgentCore · Claude</text>

  <!-- inline tools -->
  <rect x="478" y="856" width="180" height="56" rx="8" fill="#e5e8f8" stroke="#4a4eae" stroke-width="1.5"/>
  <text x="568" y="880" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2a38">inline tools</text>
  <text x="568" y="896" text-anchor="middle" font-size="10" fill="#5b6b7a">list_recipes · get_recipe</text>

  <!-- S3 recipes -->
  <rect x="742" y="856" width="150" height="56" rx="8" fill="#fff" stroke="#4a4eae" stroke-width="1.5"/>
  <text x="817" y="880" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2a38">S3 · recipes</text>
  <text x="817" y="896" text-anchor="middle" font-size="10" fill="#5b6b7a">scoped to userId</text>

  <!-- arrows: trigger -> agent -->
  <line x1="178" y1="884" x2="212" y2="884" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="195" y="877" text-anchor="middle" font-size="9" fill="#6a6fae">invoke</text>

  <!-- agentic loop: agent <-> tools -->
  <line x1="394" y1="876" x2="476" y2="876" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="435" y="870" text-anchor="middle" font-size="10" fill="#6a6fae">tool_use</text>
  <line x1="478" y1="896" x2="396" y2="896" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="437" y="908" text-anchor="middle" font-size="10" fill="#6a6fae">result</text>

  <!-- tools -> S3 recipes -->
  <line x1="658" y1="884" x2="740" y2="884" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="699" y="877" text-anchor="middle" font-size="10" fill="#6a6fae">read (IAM)</text>

  <!-- write path -->
  <line x1="304" y1="912" x2="304" y2="921" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="250" y="918" text-anchor="middle" font-size="9" fill="#6a6fae">writes report</text>

  <rect x="214" y="922" width="220" height="40" rx="8" fill="#fff" stroke="#4a4eae" stroke-width="1.5"/>
  <text x="324" y="946" text-anchor="middle" font-size="12" font-weight="600" fill="#1a2a38">S3 · insights/{userId}.json</text>

  <rect x="488" y="922" width="150" height="40" rx="8" fill="#fff" stroke="#4a4eae" stroke-width="1.5"/>
  <text x="563" y="940" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2a38">Dashboard</text>
  <text x="563" y="954" text-anchor="middle" font-size="10" fill="#5b6b7a">owner-only refresh</text>

  <line x1="434" y1="942" x2="486" y2="942" stroke="#5b6b7a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="460" y="936" text-anchor="middle" font-size="10" fill="#6a6fae">serves</text>
</svg>
